name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    name: Prepare Deployment Metadata
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      deploy_sha: ${{ steps.vars.outputs.deploy_sha }}
      deploy_branch: ${{ steps.vars.outputs.deploy_branch }}
      is_default_branch: ${{ steps.vars.outputs.is_default_branch }}

    steps:
      - name: Resolve commit to deploy
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
            DEPLOY_BRANCH="${{ github.event.workflow_run.head_branch }}"
          else
            DEPLOY_SHA="${{ github.sha }}"
            DEPLOY_BRANCH="${{ github.ref_name }}"
          fi

          IS_DEFAULT_BRANCH=false
          if [ "$DEPLOY_BRANCH" = "${{ github.event.repository.default_branch }}" ]; then
            IS_DEFAULT_BRANCH=true
          fi

          echo "deploy_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
          echo "deploy_branch=$DEPLOY_BRANCH" >> "$GITHUB_OUTPUT"
          echo "is_default_branch=$IS_DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"

  docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.deploy_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ needs.prepare.outputs.deploy_sha }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_default_branch == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Configure VPS and Deploy
    runs-on: ubuntu-latest
    needs:
      - prepare
      - docker

    env:
      IMAGE_REF: ghcr.io/${{ github.repository }}:sha-${{ needs.prepare.outputs.deploy_sha }}
      APP_DIR: /opt/calories-detect-backend
      APP_PORT: ${{ secrets.APP_PORT }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
      JWT_REFRESH_EXPIRATION: ${{ secrets.JWT_REFRESH_EXPIRATION }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Configure VPS and restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: IMAGE_REF,APP_DIR,APP_PORT,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,JWT_SECRET,JWT_EXPIRATION,JWT_REFRESH_EXPIRATION,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e

            APP_PORT="${APP_PORT:-8080}"
            POSTGRES_DB="${POSTGRES_DB:-calories_detect}"
            POSTGRES_USER="${POSTGRES_USER:-calories_user}"
            JWT_EXPIRATION="${JWT_EXPIRATION:-24h}"
            JWT_REFRESH_EXPIRATION="${JWT_REFRESH_EXPIRATION:-7d}"

            if [ -z "$POSTGRES_PASSWORD" ]; then
              echo "POSTGRES_PASSWORD secret is required"
              exit 1
            fi

            if [ -z "$JWT_SECRET" ]; then
              echo "JWT_SECRET secret is required"
              exit 1
            fi

            if ! command -v curl >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y curl
            fi

            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sudo sh
            fi

            DOCKER="docker"
            if ! docker info >/dev/null 2>&1; then
              DOCKER="sudo docker"
            fi

            sudo mkdir -p "$APP_DIR"
            sudo chown "$USER:$USER" "$APP_DIR"
            cd "$APP_DIR"

            echo "$GHCR_TOKEN" | $DOCKER login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            umask 077
            cat > .env <<EOF
            APP_PORT=$APP_PORT
            POSTGRES_DB=$POSTGRES_DB
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            JWT_SECRET=$JWT_SECRET
            JWT_EXPIRATION=$JWT_EXPIRATION
            JWT_REFRESH_EXPIRATION=$JWT_REFRESH_EXPIRATION
            EOF

            cat > compose.yaml <<EOF
            services:
              app:
                image: $IMAGE_REF
                container_name: calories-detect-backend
                restart: unless-stopped
                depends_on:
                  postgres:
                    condition: service_healthy
                environment:
                  DB_HOST: postgres
                  DB_PORT: 5432
                  DB_NAME: \${POSTGRES_DB}
                  DB_USERNAME: \${POSTGRES_USER}
                  DB_PASSWORD: \${POSTGRES_PASSWORD}
                  JWT_SECRET: \${JWT_SECRET}
                  JWT_EXPIRATION: \${JWT_EXPIRATION}
                  JWT_REFRESH_EXPIRATION: \${JWT_REFRESH_EXPIRATION}
                ports:
                  - "\${APP_PORT}:8080"

              postgres:
                image: postgres:16-alpine
                container_name: calories-detect-postgres
                restart: unless-stopped
                environment:
                  POSTGRES_DB: \${POSTGRES_DB}
                  POSTGRES_USER: \${POSTGRES_USER}
                  POSTGRES_PASSWORD: \${POSTGRES_PASSWORD}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U \$\${POSTGRES_USER} -d \$\${POSTGRES_DB}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                  start_period: 10s

            volumes:
              postgres_data:
            EOF

            $DOCKER compose pull
            $DOCKER compose up -d

            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${APP_PORT}/api/health" >/dev/null; then
                echo "Application is healthy"
                $DOCKER image prune -f
                exit 0
              fi
              sleep 3
            done

            echo "Application health check failed"
            $DOCKER compose ps
            $DOCKER compose logs app --tail 100
            exit 1
