name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    name: Prepare Docker Metadata
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      deploy_sha: ${{ steps.vars.outputs.deploy_sha }}
      deploy_branch: ${{ steps.vars.outputs.deploy_branch }}
      is_default_branch: ${{ steps.vars.outputs.is_default_branch }}

    steps:
      - name: Resolve commit to build
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
            DEPLOY_BRANCH="${{ github.event.workflow_run.head_branch }}"
          else
            DEPLOY_SHA="${{ github.sha }}"
            DEPLOY_BRANCH="${{ github.ref_name }}"
          fi

          IS_DEFAULT_BRANCH=false
          if [ "$DEPLOY_BRANCH" = "${{ github.event.repository.default_branch }}" ]; then
            IS_DEFAULT_BRANCH=true
          fi

          echo "deploy_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
          echo "deploy_branch=$DEPLOY_BRANCH" >> "$GITHUB_OUTPUT"
          echo "is_default_branch=$IS_DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"

  docker:
    name: Build and Push Docker Image to GHCR
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.deploy_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ needs.prepare.outputs.deploy_sha }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_default_branch == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max